---
AWSTemplateFormatVersion: "2010-09-09"

Description: |-
  Cross-account, cross-region backups with AWS Backup and EventBridge

  github.com/sqlxpert/backup-events-aws  GPLv3  Copyright Paul Marcelin

Parameters:

  PlaceholderSuggestedStackName:
    Type: String
    Default: "BackupEvents"

  PlaceholderSuggestedStackSetDescription:
    Type: String
    Default: "Cross-account, cross-region backups with AWS Backup and EventBridge"

  PlaceholderHelp:
    Type: String
    Default: "github.com/sqlxpert/backup-events-aws"

  EnableCopy:
    Type: String
    Description: >-
      On-demand backups completed while this is false will never be copied to
      the backup account and backup region. No catch-up provision!
    Default: "true"
    AllowedValues:
      - "false"
      - "true"

  EnableUpdateLifecycle:
    Type: String
    Description: >-
      On-demand backups completed while this is false will never have their
      lifecycles updated for early deletion. 3 copies (the usual 2 copies in
      the backup account, plus the original backup, in its original account)
      will be retained according to the backup's initial lifecycle. No
      catch-up provision!
    Default: "true"
    AllowedValues:
      - "false"
      - "true"

  BackupAccountId:
    Type: String
    Description: >-
      An account different from the one(s) containing resources to back up.
      Backups will be copied to this account.
    AllowedPattern: '.+'
    ConstraintDescription: Must not be blank

  BackupRegion:
    Type: String
    Description: >-
      Example: "us-east-1". Backups that originated in other regions will be
      copied to this second region.
    AllowedPattern: '.+'
    ConstraintDescription: Must not be blank

  BackupRegionAlternate:
    Type: String
    Description: >-
      Backups that originated in the backup region will be copied to this
      alternate second region
    AllowedPattern: '.+'
    ConstraintDescription: Must not be blank

  NewDeleteAfterDays:
    Type: Number
    Description: >-
      After a backup has been copied to the backup region and backup account,
      the original backup can be deleted; its lifecycle will be updated. Count
      days from when it was created. For incremental backups -- such as EBS
      volume snapshots (including those making up EC2 images AMIs), RDS (but
      not Aurora) database snapshots, and EFS file system backups -- do not
      reduce this below the number of days between scheduled AWS Backup
      backups. See
      https://docs.aws.amazon.com/aws-backup/latest/devguide/metering-and-billing.html
    MinValue: 1
    Default: 7

  PlaceholderAdvancedParameters:
    Type: String
    Default: ""
    AllowedValues:
      - ""

  CreateSampleVault:
    Type: String
    Description: >-
      (1) Within the backup account, vaults are required: in the backup region,
      the alternate backup region, and every region containing resources that
      will be backed up. Within resource accounts, vaults are required in every
      region containing resources that will be backed up. Vault access policies
      must allow the backup role to "backup:CopyFromBackupVault" and
      "backup:CopyIntoBackupVault" as appropriate (resource region to resource
      and backup regions in backup account). For a scalable solution, all
      vaults must be encrypted with the same customer-managed multi-region KMS
      key, and the key policies of the primary and regional replica keys must
      allow cross-account key usage, usage for AWS Backup, and usage for
      underlying AWS services (depending on the types of resources that will be
      backed up).
      (2) By default, the sample vaults are encrypted with the AWS-managed
      "aws/backup" KMS key in each account and region, so they can only be
      used to demonstrate backing up unencrypted EFS file systems.
      (3) Combining KMS encryption, AWS Backup, multiple resource types,
      multiple regions, and multiple accounts is an advanced topic. See
      https://docs.aws.amazon.com/aws-backup/latest/devguide/encryption.html
    Default: "true"
    AllowedValues:
      - "false"
      - "true"

  VaultCustomKmsKey:
    Type: String
    Description: >-
      Generally, leave blank.
      If you are using the sample vaults but bringing your own key (BYOK),
      specify "ACCOUNT:key/KEY_ID", where KEY_ID begins with "mrk-". This must
      be a suitably-configured customer-managed multi-region KMS key. See
      CreateSampleVault (above) for the requirements.
    Default: ""

  VaultName:
    Type: String
    Description: >-
      (Not ARN!) All required vaults must have the same name. Change this if
      you are bringing your own vaults (BYOV), or if you are using the sample
      vaults but you need to create multiple stacks from the same template, in
      the same accounts and regions, for example, during a blue/green
      deployment.
    Default: "BackupEvents-Sample"

  CopyRoleName:
    Type: String
    Description: >-
      (Not ARN!) The AWS Backup service will assume this role when copying
      backups. A role of the same name is required in each account that
      contains resources to back up. (Roles are acount-wide, not regional.)
      For possible one-time setup steps before using
      "service-role/AWSBackupDefaultServiceRole", see
      https://docs.aws.amazon.com/aws-backup/latest/devguide/iam-service-roles.html#default-service-roles
    Default: "service-role/AWSBackupDefaultServiceRole"

  LogLevel:
    Type: String
    Description: >-
      See https://docs.python.org/3/library/logging.html#levels
    Default: ERROR
    AllowedValues:
      - CRITICAL
      - ERROR
      - WARNING
      - INFO
      - DEBUG
      - NOTSET

  LogRetentionInDays:
    Type: Number
    Description: >-
      See retentionInDays in
      http://docs.aws.amazon.com/AmazonCloudWatchLogs/latest/APIReference/API_PutRetentionPolicy.html
    Default: 7

  ErrorQueueMessageRetentionPeriodSecs:
    Type: Number
    Description: >-
      For consistency, and if CloudWatch Logs and SQS allow, set this to
      LogRetentionInDays * 86400 . See MessageRetentionPeriod in
      https://docs.aws.amazon.com/AWSSimpleQueueService/latest/APIReference/API_SetQueueAttributes.html#API_SetQueueAttributes_RequestParameters
    Default: 604800

  ErrorQueueAdditionalPolicyStatements:
    Type: String
    Description: >-
      Additional statements for the error queue policy. The least-privilege
      default is the empty string. For each custom statement, including the
      first or only one, specify a comma and a JSON object. You could allow
      access from a central monitoring account, for example. See
      https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/sqs-creating-custom-policies.html
    Default: ''  # Values might contain double quotation marks!

  UniqueNamePrefix:
    Type: String
    Description: >-
      Change this only if you need to create multiple stacks from the same
      template, in the same accounts and regions, for example, during a
      blue/green deployment
    Default: "BackupEvents"

  CloudWatchLogsKmsKey:
    Type: String
    Description: >-
      If this is blank, the function log receives CloudWatch default non-KMS
      encryption.
      To use a customer-managed, multi-region KMS encryption key instead,
      specify "ACCOUNT:key/KEY_ID", where KEY_ID begins with "mrk-". The
      primary, or a replica key, must exist in regions containing resources to
      back up. Key policy updates are necessary. See
      https://docs.aws.amazon.com/AmazonCloudWatch/latest/logs/encrypt-log-data-kms.html#cmk-permissions
    Default: ""

  SqsKmsKey:
    Type: String
    Description: >-
      If this is blank, messages sent to the error queue receive SQS default
      non-KMS encryption.
      To use the AWS-managed default KMS key, specify "alias/aws/sqs".
      To use a customer-managed, multi-region KMS key, specify
      "ACCOUNT:key/KEY_ID", where where KEY_ID begins with "mrk-". The
      primary, or a replica key, must exist in regions containing resources to
      back up. Key policy updates are necessary. See
      https://docs.aws.amazon.com/AWSSimpleQueueService/latest/SQSDeveloperGuide/sqs-key-management.html#compatibility-with-aws-services
    Default: ""

  CopyLambdaFnMemoryMB:
    Type: Number
    Description: >-
      Increase this only in case of out-of-memory errors. See
      https://docs.aws.amazon.com/lambda/latest/operatorguide/computing-power.html
    Default: 128

  CopyLambdaFnTimeoutSecs:
    Type: Number
    Description: >-
      Increase this only in case of time-out errors. See
      https://aws.amazon.com/about-aws/whats-new/2018/10/aws-lambda-supports-functions-that-can-run-up-to-15-minutes/
    Default: 30

  UpdateLifecycleLambdaFnMemoryMB:
    Type: Number
    Description: >-
      Increase this only in case of out-of-memory errors
    Default: 128

  UpdateLifecycleLambdaFnTimeoutSecs:
    Type: Number
    Description: >-
      Increase this only in case of time-out errors
    Default: 60

Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:

      - Label: { default: For Reference }
        Parameters:
          - PlaceholderSuggestedStackName
          - PlaceholderSuggestedStackSetDescription
          - PlaceholderHelp

      - Label: { default: Essential }
        Parameters:
          - EnableCopy
          - EnableUpdateLifecycle
          - BackupAccountId
          - BackupRegion
          - BackupRegionAlternate
          - NewDeleteAfterDays

      - Label: { default: Advanced... }
        Parameters:
          - PlaceholderAdvancedParameters

      - Label: { default: Vaults }
        Parameters:
          - CreateSampleVault
          - VaultCustomKmsKey
          - VaultName
          - CopyRoleName

      - Label: { default: Both AWS Lambda functions... }
        Parameters:
          - LogLevel
          - LogRetentionInDays
          - ErrorQueueMessageRetentionPeriodSecs
          - ErrorQueueAdditionalPolicyStatements
          - UniqueNamePrefix
          - CloudWatchLogsKmsKey
          - SqsKmsKey

      - Label: { default: Function to start copying a backup }
        Parameters:
          - CopyLambdaFnMemoryMB
          - CopyLambdaFnTimeoutSecs

      - Label: { default: Function to schedule a backup for deletion }
        Parameters:
          - UpdateLifecycleLambdaFnMemoryMB
          - UpdateLifecycleLambdaFnTimeoutSecs

    ParameterLabels:

      PlaceholderSuggestedStackName:
        default: Suggested stack or StackSet name
      PlaceholderSuggestedStackSetDescription:
        default: Suggested StackSet description
      PlaceholderHelp:
        default: For help, see

      EnableCopy:
        default: Enable copying of backups
      EnableUpdateLifecycle:
        default: Enable backup retention reduction
      BackupAccountId:
        default: Backup AWS account
      BackupRegion:
        default: Backup region
      BackupRegionAlternate:
        default: Alternate for backup region
      NewDeleteAfterDays:
        default: Days (from creation) to keep original backups

      PlaceholderAdvancedParameters:
        default: Do not change the parameters below, unless necessary!

      CreateSampleVault:
        default: Create sample vaults?
      VaultCustomKmsKey:
        default: Custom KMS key for sample vaults
      VaultName:
        default: Vault name
      CopyRoleName:
        default: IAM role name for copying backups

      LogLevel:
        default: Level of detail in log
      LogRetentionInDays:
        default: Days before deleting log entries
      ErrorQueueMessageRetentionPeriodSecs:
        default: Seconds before deleting error queue messages
      ErrorQueueAdditionalPolicyStatements:
        default: Additional error queue policy statements
      UniqueNamePrefix:
        default: Unique resource name prefix
      CloudWatchLogsKmsKey:
        default: KMS encryption key for log
      SqsKmsKey:
        default: KMS encryption key for error queue

      CopyLambdaFnMemoryMB:
        default: Megabytes of memory
      CopyLambdaFnTimeoutSecs:
        default: Seconds before timeout

      UpdateLifecycleLambdaFnMemoryMB:
        default: Megabytes of memory
      UpdateLifecycleLambdaFnTimeoutSecs:
        default: Seconds before timeout

Rules:

  BackupRegionNotEqualsAlternate:
    Assertions:
      - Assert:
          !Not [ !Equals [ !Ref BackupRegion, !Ref BackupRegionAlternate ] ]
        AssertDescription: >-
          BackupRegion and BackupRegionAlternate must be different.

  EnableUpdateLifecycleRequiresEnableCopy:
    Assertions:
      - Assert:
          Fn::Not:
            - Fn::And:
                - !Equals [ !Ref EnableUpdateLifecycle, "true" ]
                - !Not [ !Equals [ !Ref EnableCopy, "true" ] ]
        AssertDescription: >-
          EnableUpdateLifecycle requires EnableCopy.

Conditions:

  EnableCopyTrue: !Equals [ !Ref EnableCopy, "true" ]
  EnableUpdateLifecycleTrue: !Equals [ !Ref EnableUpdateLifecycle, "true" ]

  InBackupRegion: !Equals [ !Ref AWS::Region, !Ref BackupRegion ]

  InBackupAccount: !Equals [ !Ref AWS::AccountId, !Ref BackupAccountId ]
  NotInBackupAccount: !Not [ !Condition InBackupAccount ]

  CreateSampleVaultTrue: !Equals [ !Ref CreateSampleVault, "true" ]
  VaultCustomKmsKeyNo: !Equals [ !Ref VaultCustomKmsKey, "" ]

  CloudWatchLogsKmsKeyNo: !Equals [ !Ref CloudWatchLogsKmsKey, "" ]

  SqsKmsKeyNo: !Equals [ !Ref SqsKmsKey, "" ]
  SqsKmsKeyCustom:
    Fn::And:
      - !Not [ !Condition SqsKmsKeyNo ]
      - !Not [ !Equals [ !Ref SqsKmsKey, "alias/aws/sqs" ] ]

Resources:

  ErrorQueuePol:
    Type: AWS::SQS::QueuePolicy
    Condition: NotInBackupAccount
    Properties:
      Queues: [ !Ref ErrorQueue ]
      # Using YAML makes a policy easier to read, but we need to support
      # insertion of custom JSON from ErrorQueueAdditionalPolicyStatements .
      PolicyDocument: !Sub
        - >-
          {
            "Version": "2012-10-17",
            "Statement": [
              {
                "Sid": "RequireTls",
                "Effect": "Deny",
                "Principal": "*",
                "Action": "sqs:*",
                "Resource": "*",
                "Condition": {
                  "Bool": {
                    "aws:SecureTransport": "false"
                  }
                }
              },
              {
                "Sid": "${SourceEventRulesSid}",
                "Effect": "Allow",
                "Principal": {
                  "Service": "events.amazonaws.com"
                },
                "Action": "sqs:SendMessage",
                "Resource": "*",
                "Condition": {
                  "ArnEquals": {
                    "aws:SourceArn": [
                      "${BackupCompletedCopyLambdaFnEvRule.Arn}",
                      "${Copy1CompletedUpdateLifecycleLambdaFnEvRule.Arn}",
                      "${CopyFailedSqsErrorQueueEvRule}"
                    ]
                  }
                }
              },
              {
                "Sid": "${SourceLambdaFnsSid}",
                "Effect": "Allow",
                "Principal": "*",
                "Action": "sqs:SendMessage",
                "Resource": "*",
                "Condition": {
                  "ArnEquals": {
                    "aws:PrincipalArn": [
                      "${CopyLambdaFnRole.Arn}",
                      "${UpdateLifecycleLambdaFnRole.Arn}"
                    ]
                  }
                }
              },
              {
                "Sid": "ExclusiveSources",
                "Effect": "Deny",
                "Principal": "*",
                "Action": "sqs:SendMessage",
                "Resource": "*",
                "Condition": {
                  "ArnNotEquals": {
                    "aws:SourceArn": [
                      "${BackupCompletedCopyLambdaFnEvRule.Arn}",
                      "${Copy1CompletedUpdateLifecycleLambdaFnEvRule.Arn}",
                      "${CopyFailedSqsErrorQueueEvRule}"
                    ],
                    "aws:PrincipalArn": [
                      "${CopyLambdaFnRole.Arn}",
                      "${UpdateLifecycleLambdaFnRole.Arn}"
                    ]
                  }
                }
              }
              ${ErrorQueueAdditionalPolicyStatements}
            ]
          }
        -
          SourceEventRulesSid: !If
            - SqsKmsKeyCustom
            - SourceEventRulesNoteKeyPolicyNeedsEventBridgeSqsKmsEncrypt
            - SourceEventRules
          SourceLambdaFnsSid: !If
            - SqsKmsKeyCustom
            - SourceLambdaFnsNoteRoleNeedsSqsKmsDecrypt
            - SourceLambdaFns

  # Administrator: Restrict iam:PassRole to prevent arbitrary use of these
  # roles

  CopyLambdaFnRole:
    Type: AWS::IAM::Role
    Condition: NotInBackupAccount
    Properties:
      Description: !Sub "For ${AWS::Region} region"
      # Conspicuous in the AWS Console. Prefer CloudFormation naming and one
      # role per region, for a role that is not referenced from other AWS
      # accounts. One all-region role would: be a little less secure,
      # require an extra parameter (region in which to house roles), and
      # create a cross-region deployment order dependency.

      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      Policies:

        - PolicyName: CloudWatchLogsCreateLogGroupIfDeleted
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                Resource: !GetAtt LambdaFnLogGrp.Arn
        - PolicyName: CloudWatchLogsWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                # https://docs.aws.amazon.com/service-authorization/latest/reference/list_amazoncloudwatchlogs.html#amazoncloudwatchlogs-resources-for-iam-policies
                # Warning: Transforming a log-group ARN to a log-stream ARN
                # this way works if the only wildcard comes at the end.
                Resource: !Sub
                  - "${LogGroupArnBase}:log-stream:*"
                  - LogGroupArnBase: !Select
                      - 0
                      - !Split [ ":*", !GetAtt LambdaFnLogGrp.Arn ]

        - PolicyName: BackupCopy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: backup:StartCopyJob
                Resource: "*"
                Condition:
                  StringEquals:
                    "aws:ResourceAccount": !Ref AWS::AccountId
                    # This is a global ("aws:"), not AWS Backup ("backup:")
                    # condition key. "Resource" refers to the original backup
                    # or to a copy, not to the "protected resource" (that is,
                    # not to the resource that was backed up).
              - Effect: Allow
                Action: iam:PassRole
                Resource: !Sub "arn:${AWS::Partition}:iam::${AWS::AccountId}:role/${CopyRoleName}"
                Condition:
                  StringLike: { "iam:PassedToService": backup.amazonaws.com }

  UpdateLifecycleLambdaFnRole:
    Type: AWS::IAM::Role
    Condition: NotInBackupAccount
    Properties:
      Description: !Sub "For ${AWS::Region} region"  # Conspicuous in Console
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      Policies:

        - PolicyName: CloudWatchLogsCreateLogGroupIfDeleted
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                Resource: !GetAtt LambdaFnLogGrp.Arn
        - PolicyName: CloudWatchLogsWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                # https://docs.aws.amazon.com/service-authorization/latest/reference/list_amazoncloudwatchlogs.html#amazoncloudwatchlogs-resources-for-iam-policies
                # Warning: Transforming a log-group ARN to a log-stream ARN
                # this way works if the only wildcard comes at the end.
                Resource: !Sub
                  - "${LogGroupArnBase}:log-stream:*"
                  - LogGroupArnBase: !Select
                      - 0
                      - !Split [ ":*", !GetAtt LambdaFnLogGrp.Arn ]

        - PolicyName: BackupRead
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: backup:DescribeRecoveryPoint
                Resource: "*"
                Condition:
                  StringEquals:
                    "aws:ResourceAccount": !Ref AWS::AccountId
                    # This is a global ("aws:"), not AWS Backup ("backup:")
                    # condition key. "Resource" refers to the original backup,
                    # not to the "protected resource" (that is, not to the
                    # resource that was backed up).
        - PolicyName: BackupWrite
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: backup:UpdateRecoveryPointLifecycle
                Resource: "*"
                Condition:
                  StringEquals:
                    "aws:ResourceAccount": !Ref AWS::AccountId
                    # This is a global ("aws:"), not AWS Backup ("backup:")
                    # condition key. "Resource" refers to the original backup,
                    # not to the "protected resource" (that is, not to the
                    # resource that was backed up).

  SampleVault:
    Type: AWS::Backup::BackupVault
    Condition: CreateSampleVaultTrue
    Properties:
      BackupVaultName: !Ref VaultName
      EncryptionKeyArn: !If
        - VaultCustomKmsKeyNo
        - !Ref AWS::NoValue
        - !Sub "arn:${AWS::Partition}:kms:${AWS::Region}:${VaultCustomKmsKey}"
      BackupVaultTags:
        Note: !If
          - VaultCustomKmsKeyNo
          - !If
            - InBackupAccount
            - !If
              - InBackupRegion
              - >-
                  Only for copies of EFS backups.
                  Original backup: other account and other region and
                  unencrypted.
                  This copy: encrypted with the aws/backup key for this
                  account and this region.
              - >-
                  Only for copies of EFS backups.
                  Original backup: other account and same region and
                  unencrypted.
                  This copy: encrypted with the aws/backup key for this
                  account and this region.
            - >-
                Only for backups of unencrypted EFS file systems.
                File system: same account and same region and unencrypted.
                This backup: encrypted with the aws/backup key for this
                account and this region.
          - !Ref AWS::NoValue
      AccessPolicy: !If
        - InBackupAccount
        - Version: "2012-10-17"
          Statement:
            - Sid: CopyIntoBackupVaultAllowServiceRole
              Effect: Allow
              Principal: "*"
              Condition:
                StringEquals:
                  "aws:PrincipalOrgId": "${aws:ResourceOrgID}"
                ArnLike:
                  "aws:PrincipalArn": !Sub "arn:aws:iam::*:role/${CopyRoleName}"
              Action: backup:CopyIntoBackupVault
              Resource: "*"
        - Version: "2012-10-17"
          Statement:
            - Sid: CopyWithinOrganizationOnly
              Effect: Deny
              Principal: "*"
              Action: backup:CopyFromBackupVault
              Resource: "*"
              Condition:
                "ForAllValues:StringNotLike":
                  "backup:CopyTargetOrgPaths": "${aws:ResourceOrgID}/*"
            - Sid: CopyOnlyToSameVaultInBackupOrResourceRegionInBackupAccount
              Effect: Deny
              Principal: "*"
              Action: backup:CopyFromBackupVault
              Resource: "*"
              Condition:
                "ForAllValues:ArnNotLike":
                  "backup:CopyTargets":
                    # See also destination_vault_arn
                    - !Sub
                      - "arn:${AWS::Partition}:backup:${DestinationRegion}:${BackupAccountId}:backup-vault:${VaultName}"
                      - DestinationRegion: !If
                          - InBackupRegion
                          - !Ref BackupRegionAlternate
                          - !Ref BackupRegion
                    - !Sub
                      - "arn:${AWS::Partition}:backup:${DestinationRegion}:${BackupAccountId}:backup-vault:${VaultName}"
                      - DestinationRegion: !Ref AWS::Region

  ErrorQueue:
    Type: AWS::SQS::Queue
    Condition: NotInBackupAccount
    Properties:
      # Fixed name accommodates potential polling from a central account
      QueueName: !Sub "${UniqueNamePrefix}-ErrorQueue"

      DelaySeconds: 0
      MessageRetentionPeriod: !Ref ErrorQueueMessageRetentionPeriodSecs
      ReceiveMessageWaitTimeSeconds: 20  # long polling (lowest cost)
      VisibilityTimeout: 60  # seconds
      SqsManagedSseEnabled: !If [ SqsKmsKeyNo, true, false ]
      KmsMasterKeyId: !If
        - SqsKmsKeyNo
        - !Ref AWS::NoValue
        - !If
          - SqsKmsKeyCustom
          - !Sub "arn:${AWS::Partition}:kms:${AWS::Region}:${SqsKmsKey}"
          - !Ref SqsKmsKey
      KmsDataKeyReusePeriodSeconds: !If
        - SqsKmsKeyNo
        - !Ref AWS::NoValue
        - 86400  # seconds (24 hours)

  LambdaFnLogGrp:
    Type: AWS::Logs::LogGroup
    Condition: NotInBackupAccount
    Properties:
      RetentionInDays: !Ref LogRetentionInDays
      KmsKeyId: !If
        - CloudWatchLogsKmsKeyNo
        - !Ref AWS::NoValue
        - !Sub "arn:${AWS::Partition}:kms:${AWS::Region}:${CloudWatchLogsKmsKey}"

  BackupCompletedCopyLambdaFnEvRule:
    Type: AWS::Events::Rule
    Condition: NotInBackupAccount
    Properties:
      Description: >-
        After on-demand backup has been created,
        copy to backup account (backup region and resource region)
      EventPattern:
        source: [ aws.backup ]
        detail-type: [ Backup Job State Change ]
        version: [ "0" ]
        detail:
          state: [ COMPLETED ]
          backupVaultArn:
            - !Sub "arn:${AWS::Partition}:backup:${AWS::Region}:${AWS::AccountId}:backup-vault:${VaultName}"
          createdBy:
            backupPlanArn: [ { "exists": false } ]
      Targets:

        - Id: CopyToBackupAccountBackupRegion
          InputTransformer:
            InputTemplate: !Sub
              - |
                  {
                    "originalEvent" : <aws.events.event.json>,
                    "destinationRegion" : "${DestinationRegion}"
                  }
              - DestinationRegion: !If
                  - InBackupRegion
                  - !Ref BackupRegionAlternate
                  - !Ref BackupRegion
          Arn: !GetAtt CopyLambdaFn.Arn
          RetryPolicy:
            MaximumEventAgeInSeconds: 36000  # 10 hours
          DeadLetterConfig: { Arn: !GetAtt ErrorQueue.Arn }

        - Id: CopyToBackupAccountOriginalRegion
          InputTransformer:
            InputTemplate: !Sub |
              {
                "originalEvent" : <aws.events.event.json>,
                "destinationRegion" : "${AWS::Region}"
              }
          Arn: !GetAtt CopyLambdaFn.Arn
          RetryPolicy:
            MaximumEventAgeInSeconds: 36000  # 10 hours
          DeadLetterConfig: { Arn: !GetAtt ErrorQueue.Arn }

      State: !If [ EnableCopyTrue, ENABLED, DISABLED ]

  BackupFailedSqsErrorQueueEvRule:
    Type: AWS::Events::Rule
    Condition: NotInBackupAccount
    Properties:
      Description: >-
        If on-demand backup fails, log to error queue
      EventPattern:
        source: [ aws.backup ]
        detail-type: [ Backup Job State Change ]
        version: [ "0" ]
        detail:
          state: [ FAILED ]
          backupVaultArn:
            - !Sub "arn:${AWS::Partition}:backup:${AWS::Region}:${AWS::AccountId}:backup-vault:${VaultName}"
          createdBy:
            backupPlanArn: [ { "exists": false } ]
      Targets:
        - Id: SendToErrorQueue
          Arn: !GetAtt ErrorQueue.Arn
          RetryPolicy:
